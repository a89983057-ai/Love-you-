<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    color:#333;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    max-width:400px;
}

h1{
    color:#ff4d6d;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#e63e5c;
}

#message{
    margin-top:20px;
    font-size:18px;
    display:none;
}

.heart{
    position:fixed;
    color:red;
    animation: float 4s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1}
    100%{transform:translateY(-800px);opacity:0}
}
</style>
</head>

<body>

<div class="card">
<h1>Hey ❤️</h1>
<p>I just wanted to remind you something...</p>

<button onclick="showMessage()">Click Me</button>

<div id="message">
<p>You are important to me.</p>
<p>You make my days better.</p>
<p>And seeing you smile is my favorite thing.</p>
<p>So if you're upset… I hope this tiny page makes you smile 🙂</p>
</div>
</div>

<script>
function showMessage(){
    document.getElementById("message").style.display="block";
    createHearts();
}

function createHearts(){
    for(let i=0;i<20;i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*100+"vw";
        heart.style.fontSize=(Math.random()*20+20)+"px";
        document.body.appendChild(heart);

        setTimeout(()=>{heart.remove()},4000);
    }
}
</script>

</body>
</html>
